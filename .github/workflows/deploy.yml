name: Deploy BQML
on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/135217867785/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
        service_account: 'zta-bioauth-app@forward-sentry-456317-k6.iam.gserviceaccount.com'

    - uses: google-github-actions/setup-gcloud@v2

    - run: bq query --use_legacy_sql=false < sql/train_model.sql
